<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSSC Social Media Poster</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-dark: #020412;
            --bg-panel: #0a0f24;
            
            /* TikTok Colors */
            --tik-1: #00f2ea;
            --tik-2: #ff0050;
            --tik-glow: rgba(0, 242, 234, 0.6);

            /* LinkedIn Colors */
            --li-1: #0077b5;
            --li-2: #00a0dc;
            --li-glow: rgba(0, 119, 181, 0.6);

            /* WhatsApp Colors */
            --wa-1: #25d366;
            --wa-2: #128c7e;
            --wa-glow: rgba(37, 211, 102, 0.6);

            /* Instagram Colors */
            --ig-1: #833ab4;
            --ig-2: #fd1d1d;
            --ig-glow: rgba(131, 58, 180, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            width: 210mm;
            height: 297mm;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                linear-gradient(rgba(10, 16, 35, 0.9), rgba(10, 16, 35, 0.95)),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10 L90 10 L90 90 L10 90 Z' fill='none' stroke='%231a2345' stroke-width='1'/%3E%3Cpath d='M50 10 L50 90 M10 50 L90 50' fill='none' stroke='%231a2345' stroke-width='1'/%3E%3C/svg%3E");
        }

        /* HEADER */
        header {
            width: 100%;
            padding: 15mm 15mm 5mm 15mm;
            text-align: center;
            z-index: 2;
        }

        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            line-height: 1;
        }

        .logo-uni { font-size: 2rem; color: white; text-align: right; border-right: 2px solid #334466; padding-right: 20px; }
        .logo-uni span { color: #cc0000; }
        
        .logo-cssc { font-size: 2rem; color: white; text-align: left; padding-left: 0px; }
        .logo-cssc small { font-size: 0.6rem; display: block; letter-spacing: 2px; font-weight: 400; color: #8899bb; margin-top: 5px; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #aabbee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            line-height: 1.2;
        }

        .blue-divider {
            height: 2px;
            width: 80%;
            background: linear-gradient(90deg, transparent, #00ddee, transparent);
            margin: 15px auto 30px auto;
            box-shadow: 0 0 10px #00ddee;
        }

        /* GRID LAYOUT */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            width: 90%; /* 180mm approx */
            height: 65%;
            padding: 10px;
        }

        /* CARD STYLES */
        .card {
            position: relative;
            background: rgba(13, 20, 40, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Cut corners look */
            clip-path: polygon(
                20px 0, 100% 0, 
                100% calc(100% - 20px), 
                calc(100% - 20px) 100%, 
                0 100%, 
                0 20px
            );
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* Inner glowing border simulation */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 20px;
            padding: 2px;
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* QR CONTAINER */
        .qr-wrapper {
            position: relative;
            padding: 15px;
            background: white;
            border-radius: 10px;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* CENTER ICON OVERLAY */
        .center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            font-size: 24px;
        }

        /* HUD DECORATIONS */
        .hud-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid transparent;
        }
        
        .side-text {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
        }

        .arrows {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .arrow {
            width: 10px;
            height: 10px;
            border-top: 2px solid;
            border-right: 2px solid;
            transform: rotate(45deg); /* Point right > */
        }
        /* Rotate arrows to point UP (^) to match image left indicators? 
           Actually image shows arrows pointing UP on left side. Let's do that. */
        .arrow-up {
            transform: rotate(-45deg);
        }


        /* --- THEME: TIKTOK --- */
        .tiktok { box-shadow: 0 0 15px rgba(0, 242, 234, 0.1); }
        .tiktok::before { background: linear-gradient(135deg, var(--tik-1), var(--tik-2)); }
        .tiktok .hud-corner { border-color: var(--tik-1); box-shadow: 0 0 10px var(--tik-glow); }
        .tiktok .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .tiktok .tr { top: 30px; right: 50px; border-left: none; border-bottom: none; }
        .tiktok .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .tiktok .br { bottom: 30px; right: 50px; border-left: none; border-top: none; }
        .tiktok .center-icon { color: #000; }
        .tiktok .side-text { color: var(--tik-1); }
        .tiktok .url { color: var(--tik-1); }
        .tiktok .arrow { border-color: var(--tik-1); }

        /* --- THEME: LINKEDIN --- */
        .linkedin { box-shadow: 0 0 15px rgba(0, 119, 181, 0.1); }
        .linkedin::before { background: linear-gradient(135deg, var(--li-1), var(--li-2)); }
        .linkedin .hud-corner { border-color: var(--li-1); box-shadow: 0 0 10px var(--li-glow); }
        .linkedin .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .linkedin .tr { top: 30px; right: 50px; border-left: none; border-bottom: none; }
        .linkedin .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .linkedin .br { bottom: 30px; right: 50px; border-left: none; border-top: none; }
        .linkedin .center-icon { color: var(--li-1); }
        .linkedin .side-text { color: var(--li-2); }
        .linkedin .url { color: var(--li-2); }
        .linkedin .arrow { border-color: var(--li-1); }

        /* --- THEME: WHATSAPP --- */
        .whatsapp { box-shadow: 0 0 15px rgba(37, 211, 102, 0.1); }
        .whatsapp::before { background: linear-gradient(135deg, var(--wa-1), var(--wa-2)); }
        .whatsapp .hud-corner { border-color: var(--wa-1); box-shadow: 0 0 10px var(--wa-glow); }
        .whatsapp .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .whatsapp .tr { top: 30px; right: 50px; border-left: none; border-bottom: none; }
        .whatsapp .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .whatsapp .br { bottom: 30px; right: 50px; border-left: none; border-top: none; }
        .whatsapp .center-icon { color: var(--wa-2); }
        .whatsapp .side-text { color: var(--wa-1); }
        .whatsapp .url { color: var(--wa-1); }
        .whatsapp .arrow { border-color: var(--wa-1); }

        /* --- THEME: INSTAGRAM --- */
        .instagram { box-shadow: 0 0 15px rgba(131, 58, 180, 0.1); }
        .instagram::before { background: linear-gradient(135deg, var(--ig-1), var(--ig-2)); }
        .instagram .hud-corner { border-color: var(--ig-1); box-shadow: 0 0 10px var(--ig-glow); }
        .instagram .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .instagram .tr { top: 30px; right: 50px; border-left: none; border-bottom: none; }
        .instagram .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .instagram .br { bottom: 30px; right: 50px; border-left: none; border-top: none; }
        .instagram .center-icon { color: #C13584; }
        .instagram .side-text { color: var(--ig-1); }
        .instagram .url { color: var(--ig-1); }
        .instagram .arrow { border-color: var(--ig-1); }


        .url {
            margin-top: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            text-decoration: none;
            opacity: 0.9;
            text-align: center;
            word-break: break-all;
            max-width: 90%;
        }

        /* FOOTER */
        footer {
            margin-top: auto;
            margin-bottom: 15mm;
            text-align: center;
            width: 100%;
        }

        .footer-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ddee;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ddee;
        }
        
        .line {
            height: 2px;
            width: 100px;
            background: linear-gradient(90deg, transparent, #00ddee, transparent);
        }

        .footer-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: white;
        }

        .footer-sub {
            font-size: 1rem;
            color: #aabbee;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

    </style>
</head>

</html>
